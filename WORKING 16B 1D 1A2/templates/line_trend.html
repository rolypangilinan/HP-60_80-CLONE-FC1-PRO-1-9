<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graphical Monitoring</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        body {
            background: #ffffff;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 10px;
        }

        .page-title {
            text-align: center;
            font-size: 28px;
            font-weight: 800;
            color: #000;
            margin: 10px 0 15px 0;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .chart-cell {
            border: 2px solid #000;
            background: #fff;
            padding: 5px;
            position: relative;
        }

        .chart-canvas-wrapper {
            position: relative;
            width: 100%;
            height: 280px;
        }

        .chart-label {
            font-weight: 800;
            font-size: 13px;
            color: #000;
            margin-top: 0px;
            line-height: 1.3;
        }

        .chart-label .process-name {
            font-size: 14px;
        }

        .chart-label .operator-line {
            font-size: 11px;
            font-weight: 600;
        }

        .controls-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto 10px auto;
        }

        .btn-back {
            font-size: 16px;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: none;
            text-transform: uppercase;
        }

        .btn-back:hover {
            transform: translateY(-2px);
        }

        .btn-refresh {
            font-size: 16px;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: none;
            text-transform: uppercase;
        }

        .btn-refresh:hover {
            transform: translateY(-2px);
        }

        .legend-box {
            display: flex;
            gap: 20px;
            align-items: center;
            font-size: 13px;
            font-weight: 700;
            color: #000;
            background: #f8f8f8;
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .legend-line {
            width: 30px;
            height: 4px;
            border-radius: 2px;
        }

        .auto-refresh-label {
            font-size: 13px;
            color: #555;
            font-weight: 600;
        }

        .tolerance-selector {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tolerance-selector select {
            font-size: 18px;
            font-weight: 700;
            padding: 6px 14px;
            border: 2px solid #000;
            border-radius: 8px;
            background: #fff;
            cursor: pointer;
            min-width: 100px;
            text-align: center;
        }

        .tolerance-selector .custom-tol-input {
            font-size: 18px;
            font-weight: 700;
            padding: 6px 10px;
            border: 2px solid #000;
            border-radius: 8px;
            background: #fff;
            width: 80px;
            text-align: center;
            display: none;
        }

        .chart-label-row {
            display: flex;
            align-items: stretch;
            border-top: 2px solid #000;
        }

        .process-number-box {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 900;
            color: #000;
            min-width: 36px;
            border-right: 2px solid #000;
            background: #fff;
        }

        .chart-label-content {
            flex: 1;
            text-align: center;
            padding: 2px 5px;
        }

        @media (max-width: 1000px) {
            .charts-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 600px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="controls-bar">
    <a href="/" class="btn btn-light btn-back">BACK TO HOME</a>
    <div class="tolerance-selector">
        <span style="font-weight:800; font-size:16px;">TOLERANCE:</span>
        <select id="toleranceSelect" onchange="onToleranceChange()">
            <option value="none">-</option>
            <option value="10" selected>10%</option>
            <option value="30">30%</option>
            <option value="others">Others</option>
        </select>
        <input type="number" id="customToleranceInput" class="custom-tol-input" min="1" max="100" placeholder="%" onchange="onCustomToleranceChange()" onkeyup="onCustomToleranceChange()">
    </div>
    <div class="legend-box">
        <span style="font-weight:800; margin-right:5px;">LEGEND</span>
        <div class="legend-item">
            <div class="legend-line" style="background: #FF8C00;"></div>
            <span>(+) TOL</span>
        </div>
        <div class="legend-item">
            <div class="legend-line" style="background: #00AA00;"></div>
            <span>TACT TIME</span>
        </div>
        <div class="legend-item">
            <div class="legend-line" style="background: #FFB300;"></div>
            <span>(-) TOL</span>
        </div>
    </div>
    <div class="d-flex align-items-center gap-3">
        <span class="auto-refresh-label">Auto-refresh: <span id="refreshCountdown">30</span>s</span>
        <button class="btn btn-success btn-refresh" onclick="loadTrendData()">REFRESH</button>
    </div>
</div>

<h1 class="page-title">Graphical Monitoring</h1>

<div class="charts-grid" id="chartsGrid">
    <!-- 9 chart cells will be generated dynamically -->
</div>

<script>
    let charts = {};
    let refreshTimer = null;
    let countdown = 30;
    let lastTrendData = null;

    function getTolerancePercent() {
        const sel = document.getElementById('toleranceSelect');
        const val = sel.value;
        if (val === 'none') return null;
        if (val === 'others') {
            const custom = parseInt(document.getElementById('customToleranceInput').value);
            return isNaN(custom) || custom <= 0 ? null : custom / 100;
        }
        return parseInt(val) / 100;
    }

    function onToleranceChange() {
        const sel = document.getElementById('toleranceSelect');
        const customInput = document.getElementById('customToleranceInput');
        if (sel.value === 'others') {
            customInput.style.display = 'inline-block';
            customInput.focus();
        } else {
            customInput.style.display = 'none';
        }
        // Persist to localStorage
        localStorage.setItem('lineTrendTolerance', sel.value);
        rebuildAllCharts();
    }

    function onCustomToleranceChange() {
        const customInput = document.getElementById('customToleranceInput');
        localStorage.setItem('lineTrendCustomTolerance', customInput.value);
        rebuildAllCharts();
    }

    function rebuildAllCharts() {
        if (lastTrendData) {
            lastTrendData.forEach(processData => {
                const pno = processData.process_no;
                const canvasId = 'trendChart' + pno;
                createProcessChart(canvasId, processData);
            });
        }
    }

    function restoreToleranceFromStorage() {
        const saved = localStorage.getItem('lineTrendTolerance');
        const customVal = localStorage.getItem('lineTrendCustomTolerance');
        const sel = document.getElementById('toleranceSelect');
        const customInput = document.getElementById('customToleranceInput');
        if (saved) {
            sel.value = saved;
            if (saved === 'others') {
                customInput.style.display = 'inline-block';
                if (customVal) customInput.value = customVal;
            }
        }
    }

    function createProcessChart(canvasId, processData) {
        const canvas = document.getElementById(canvasId);
        if (!canvas) return;
        const ctx = canvas.getContext('2d');

        const records = processData.records || [];
        const tactTime = processData.tact_time;
        // Calculate tolerance from selected percentage
        const tolPct = getTolerancePercent();
        const noTolerance = (tolPct === null);
        const tolPlus = noTolerance ? null : Math.round((tactTime + tactTime * tolPct) * 100) / 100;
        const tolMinus = noTolerance ? null : Math.round((tactTime - tactTime * tolPct) * 100) / 100;

        // Data points as plain decimal M.SS values
        const dataValues = records.map(r => r.elapsed_mss);
        const labels = records.map((r, i) => (i + 1).toString());

        // If no data, show empty chart with placeholder labels
        if (labels.length === 0) {
            for (let i = 1; i <= 5; i++) labels.push(i.toString());
        }

        // Determine Y-axis max: auto-stretchable based on data
        const refVals = [tactTime];
        if (!noTolerance) { refVals.push(tolPlus, tolMinus); }
        const allVals = [...dataValues, ...refVals];
        const maxVal = Math.max(...allVals.filter(v => v > 0), noTolerance ? tactTime + 0.50 : tolPlus + 0.35);
        // Round up with padding
        const yMax = Math.ceil(maxVal * 10) / 10 + 0.10;

        // Build the 5 fixed tick values for Y-axis
        const fixedTicks = [0.00];
        if (!noTolerance) fixedTicks.push(tolMinus);
        fixedTicks.push(tactTime);
        if (!noTolerance) fixedTicks.push(tolPlus);
        fixedTicks.push(Math.round(yMax * 100) / 100);

        // Determine dot colors:
        // If no tolerance: all dots neutral blue
        // Otherwise: GREEN if within tolerance, RED if outside tolerance
        const pointColors = dataValues.map((val, idx) => {
            if (noTolerance) return '#6699CC'; // Neutral blue
            if (val >= tolMinus && val <= tolPlus) {
                return '#00CC00'; // Within tolerance = GREEN
            }
            return '#FF0000'; // Outside tolerance = RED
        });

        const pointBorderColors = pointColors.map(c => c);

        // Horizontal reference lines as datasets (plain decimal values)
        const refLineLength = Math.max(labels.length, 5);
        const tactTimeLine = new Array(refLineLength).fill(tactTime);

        // Ensure labels match reference line length
        while (labels.length < refLineLength) {
            labels.push('');
        }

        // Build datasets
        const datasets = [];

        // (+) TOL line - only if tolerance is active
        if (!noTolerance) {
            datasets.push({
                label: '(+) TOL',
                data: new Array(refLineLength).fill(tolPlus),
                borderColor: '#FF8C00',
                borderWidth: 3,
                pointRadius: 0,
                pointHoverRadius: 0,
                fill: false,
                tension: 0,
                order: 4
            });
        }

        // TACT TIME line - always visible
        datasets.push({
            label: 'TACT TIME',
            data: tactTimeLine,
            borderColor: '#00AA00',
            borderWidth: 3,
            pointRadius: 0,
            pointHoverRadius: 0,
            fill: false,
            tension: 0,
            order: 3
        });

        // (-) TOL line - only if tolerance is active
        if (!noTolerance) {
            datasets.push({
                label: '(-) TOL',
                data: new Array(refLineLength).fill(tolMinus),
                borderColor: '#FFB300',
                borderWidth: 3,
                pointRadius: 0,
                pointHoverRadius: 0,
                fill: false,
                tension: 0,
                order: 2
            });
        }

        // Cycle Time data line
        datasets.push({
            label: 'Cycle Time',
            data: dataValues.length > 0 ? dataValues : [],
            borderColor: '#6699CC',
            borderWidth: 2,
            pointBackgroundColor: pointColors,
            pointBorderColor: pointBorderColors,
            pointRadius: 7,
            pointHoverRadius: 9,
            pointBorderWidth: 2,
            fill: false,
            tension: 0.1,
            order: 1
        });

        if (charts[canvasId]) {
            charts[canvasId].destroy();
        }

        const fixedTicksCopy = [...fixedTicks];

        charts[canvasId] = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: datasets
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                layout: {
                    padding: {
                        top: 5,
                        right: 10,
                        bottom: 5,
                        left: 5
                    }
                },
                scales: {
                    x: {
                        display: true,
                        grid: {
                            display: true,
                            color: '#e0e0e0'
                        },
                        ticks: {
                            display: false
                        }
                    },
                    y: {
                        min: 0,
                        max: Math.round(yMax * 100) / 100,
                        grid: {
                            display: true,
                            color: '#e0e0e0'
                        },
                        afterBuildTicks: function(axis) {
                            axis.ticks = fixedTicksCopy.map(v => ({ value: v }));
                        },
                        ticks: {
                            font: {
                                size: 10,
                                weight: 'bold'
                            },
                            color: '#000',
                            autoSkip: false,
                            callback: function(value) {
                                return value.toFixed(2);
                            }
                        },
                        title: {
                            display: false
                        }
                    }
                },
                plugins: {
                    legend: {
                        display: false
                    },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                if (context.dataset.label === 'Cycle Time') {
                                    return 'Time: ' + context.raw.toFixed(2);
                                }
                                return context.dataset.label + ': ' + context.raw.toFixed(2);
                            }
                        },
                        titleFont: { size: 12 },
                        bodyFont: { size: 11 },
                        padding: 8
                    }
                }
            }
        });
    }

    function buildChartCells() {
        const grid = document.getElementById('chartsGrid');
        grid.innerHTML = '';
        for (let i = 1; i <= 9; i++) {
            const cell = document.createElement('div');
            cell.className = 'chart-cell';
            cell.innerHTML = `
                <div class="chart-canvas-wrapper">
                    <canvas id="trendChart${i}"></canvas>
                </div>
                <div class="chart-label-row">
                    <div class="process-number-box">${i}</div>
                    <div class="chart-label-content">
                        <div class="chart-label">
                            <div class="process-name">PROCESS ${i}</div>
                            <div class="operator-line">OPERATOR: <span id="operator${i}">-</span></div>
                        </div>
                    </div>
                </div>
            `;
            grid.appendChild(cell);
        }
    }

    function loadTrendData() {
        fetch('/api/get_line_trend_data')
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    lastTrendData = data.trend_data;
                    data.trend_data.forEach(processData => {
                        const pno = processData.process_no;
                        const canvasId = 'trendChart' + pno;
                        createProcessChart(canvasId, processData);

                        // Update operator name
                        const opEl = document.getElementById('operator' + pno);
                        if (opEl) {
                            opEl.textContent = processData.operator || '-';
                        }
                    });
                } else {
                    console.error('Failed to load trend data:', data.error);
                }
            })
            .catch(error => {
                console.error('Error loading trend data:', error);
            });
    }

    // Auto-refresh countdown
    function startAutoRefresh() {
        countdown = 30;
        if (refreshTimer) clearInterval(refreshTimer);

        refreshTimer = setInterval(() => {
            countdown--;
            document.getElementById('refreshCountdown').textContent = countdown;
            if (countdown <= 0) {
                countdown = 30;
                loadTrendData();
            }
        }, 1000);
    }

    // Initialize on page load
    window.addEventListener('load', () => {
        restoreToleranceFromStorage();
        buildChartCells();
        loadTrendData();
        startAutoRefresh();
    });
</script>

</body>
</html>
