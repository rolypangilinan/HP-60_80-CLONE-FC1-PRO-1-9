<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Cycle Time Monitoring</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            height: 100vh;
            overflow: hidden;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: clamp(10px, 2vh, 20px);
        }
        
        .header {
            text-align: center;
            margin-bottom: clamp(15px, 4vh, 40px);
        }
        
        .header h1 {
            color: white;
            font-size: clamp(24px, 5vh, 48px);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: clamp(5px, 1vh, 10px);
        }
        
        .header p {
            color: rgba(255,255,255,0.9);
            font-size: clamp(14px, 2vh, 18px);
        }
        
        .settings-container {
            background: white;
            border-radius: 20px;
            padding: clamp(20px, 4vh, 40px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-width: 800px;
            width: 100%;
        }
        
        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: clamp(10px, 2vh, 20px);
            margin-top: clamp(10px, 3vh, 30px);
        }
        
        .settings-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            padding: clamp(15px, 3vh, 30px);
            text-align: center;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }
        
        .settings-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        
        .settings-card h3 {
            font-size: clamp(16px, 2.5vh, 24px);
            margin-bottom: clamp(5px, 1vh, 10px);
        }
        
        .settings-card p {
            font-size: clamp(12px, 1.6vh, 16px);
            opacity: 0.9;
        }
        
        .back-btn {
            display: inline-block;
            background: #6c757d;
            color: white;
            padding: clamp(8px, 1.2vh, 12px) 30px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            margin-top: clamp(15px, 3vh, 30px);
            transition: all 0.3s ease;
        }
        
        .back-btn:hover {
            background: #5a6268;
            transform: translateY(-2px);
        }
        
        .icon {
            font-size: clamp(28px, 5vh, 48px);
            margin-bottom: clamp(5px, 1.5vh, 15px);
        }

        /* Height-responsive adjustments */
        @media (max-height: 700px) {
            .header {
                margin-bottom: 2vh;
            }
            .header h1 {
                font-size: clamp(20px, 4vh, 36px);
            }
            .header p {
                font-size: clamp(12px, 1.6vh, 16px);
            }
            .settings-container {
                padding: 2.5vh 25px;
            }
            .settings-grid {
                gap: 1.5vh;
                margin-top: 2vh;
            }
            .settings-card {
                padding: 2vh;
            }
            .settings-card h3 {
                font-size: clamp(14px, 2.2vh, 20px);
            }
            .icon {
                font-size: clamp(24px, 4vh, 40px);
                margin-bottom: 1vh;
            }
            .back-btn {
                margin-top: 2vh;
                padding: 1vh 25px;
            }
        }

        @media (max-height: 500px) {
            .header {
                margin-bottom: 1vh;
            }
            .header h1 {
                font-size: clamp(16px, 3.5vh, 28px);
            }
            .header p {
                font-size: clamp(10px, 1.4vh, 14px);
            }
            .settings-container {
                padding: 1.5vh 15px;
                border-radius: 12px;
            }
            .settings-grid {
                gap: 1vh;
                margin-top: 1vh;
            }
            .settings-card {
                padding: 1.2vh;
                border-radius: 10px;
            }
            .settings-card h3 {
                font-size: clamp(12px, 1.8vh, 18px);
                margin-bottom: 0.3vh;
            }
            .settings-card p {
                font-size: clamp(10px, 1.2vh, 13px);
            }
            .icon {
                font-size: clamp(20px, 3vh, 32px);
                margin-bottom: 0.5vh;
            }
            .back-btn {
                margin-top: 1vh;
                padding: 0.8vh 20px;
                font-size: clamp(11px, 1.4vh, 14px);
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>SETTINGS</h1>
        <p>Configure your cycle time monitoring system</p>
    </div>
    
    <div class="settings-container">
        <div class="settings-grid">
            <a href="/standard_time" class="settings-card">
                <div class="icon">⏱️</div>
                <h3>Standard Time</h3>
                <p>Set and manage standard times for each process</p>
            </a>
            
            <a href="/manpower" class="settings-card">
                <div class="icon">�</div>
                <h3>Manpower</h3>
                <p>Configure operator assignments per process</p>
            </a>
        </div>
        
        <div style="text-align: center;">
            <a href="/" class="back-btn">Back to Home</a>
        </div>
    </div>
</body>
</html>
