<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graphical Monitoring</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        body {
            background: #ffffff;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 10px;
        }

        .page-title {
            text-align: center;
            font-size: 28px;
            font-weight: 800;
            color: #000;
            margin: 10px 0 15px 0;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            width: 100%;
            margin: 0 auto;
        }

        .chart-cell {
            border: 2px solid #000;
            background: #fff;
            padding: 5px;
            position: relative;
            cursor: pointer;
        }

        .chart-cell:hover {
            box-shadow: 0 0 12px rgba(0,0,0,0.3);
            border-color: #0066cc;
        }

        /* Fullscreen zoom overlay */
        .zoom-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #fff;
            z-index: 9999;
            padding: 15px;
            box-sizing: border-box;
            flex-direction: column;
        }

        .zoom-overlay.active {
            display: flex;
        }

        .zoom-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .zoom-title {
            font-size: 32px;
            font-weight: 900;
            color: #000;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .zoom-operator {
            font-size: 18px;
            font-weight: 700;
            color: #333;
        }

        .zoom-kitting {
            font-size: 20px;
            font-weight: 800;
            color: #000;
        }

        .btn-zoom-back {
            font-size: 18px;
            font-weight: bold;
            padding: 12px 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: none;
            text-transform: uppercase;
            cursor: pointer;
        }

        .zoom-chart-wrapper {
            flex: 1;
            position: relative;
            min-height: 0;
        }

        .chart-canvas-wrapper {
            position: relative;
            width: 100%;
            height: calc((100vh - 160px) / 3 - 50px);
            min-height: 180px;
        }

        .chart-label {
            font-weight: 800;
            font-size: 13px;
            color: #000;
            margin-top: 0px;
            line-height: 1.3;
        }

        .chart-label .process-name {
            font-size: 14px;
        }

        .chart-label .operator-line {
            font-size: 11px;
            font-weight: 600;
        }

        .controls-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin: 0 auto 10px auto;
        }

        .btn-back {
            font-size: 16px;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: none;
            text-transform: uppercase;
        }

        .btn-back:hover {
            transform: translateY(-2px);
        }

        .btn-refresh {
            font-size: 16px;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: none;
            text-transform: uppercase;
        }

        .btn-refresh:hover {
            transform: translateY(-2px);
        }

        .legend-box {
            display: flex;
            gap: 30px;
            align-items: center;
            font-size: 18px;
            font-weight: 800;
            color: #000;
            background: #f8f8f8;
            padding: 12px 24px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .legend-color-block {
            width: 28px;
            height: 28px;
            border-radius: 4px;
        }

        .legend-circle {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid rgba(0,0,0,0.15);
        }

        .auto-refresh-label {
            font-size: 13px;
            color: #555;
            font-weight: 600;
        }

        .tolerance-selector {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tolerance-selector select {
            font-size: 18px;
            font-weight: 700;
            padding: 6px 14px;
            border: 2px solid #000;
            border-radius: 8px;
            background: #fff;
            cursor: pointer;
            min-width: 100px;
            text-align: center;
        }

        .tolerance-selector .custom-tol-input {
            font-size: 18px;
            font-weight: 700;
            padding: 6px 10px;
            border: 2px solid #000;
            border-radius: 8px;
            background: #fff;
            width: 80px;
            text-align: center;
            display: none;
        }

        .chart-label-row {
            display: flex;
            align-items: stretch;
            border-top: 2px solid #000;
        }

        .process-number-box {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 900;
            color: #000;
            min-width: 36px;
            border-right: 2px solid #000;
            background: #fff;
            transition: background 0.3s;
        }

        .kitting-number-box {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 900;
            color: #000;
            min-width: 44px;
            border-left: 2px solid #000;
            background: #fff;
        }

        .process-number-box.blink-green {
            animation: blinkGreen 0.7s ease-in-out infinite;
        }

        @keyframes blinkGreen {
            0%, 100% { background: #00cc00; color: #fff; }
            50% { background: #fff; color: #000; }
        }

        .process-number-box.blink-neg-tol {
            animation: blinkNegTol 0.7s ease-in-out infinite;
        }

        @keyframes blinkNegTol {
            0%, 100% { background: #FFB300; color: #fff; }
            50% { background: #fff; color: #000; }
        }

        .process-number-box.blink-pos-tol {
            animation: blinkPosTol 0.7s ease-in-out infinite;
        }

        @keyframes blinkPosTol {
            0%, 100% { background: #FF8C00; color: #fff; }
            50% { background: #fff; color: #000; }
        }

        .process-number-box.blink-red {
            animation: blinkRed 0.7s ease-in-out infinite;
        }

        @keyframes blinkRed {
            0%, 100% { background: #FF0000; color: #fff; }
            50% { background: #fff; color: #000; }
        }

        .chart-label-content {
            flex: 1;
            text-align: center;
            padding: 2px 5px;
        }

        @media (max-width: 1000px) {
            .charts-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .chart-canvas-wrapper {
                height: calc((100vh - 160px) / 5 - 40px);
            }
            .controls-bar {
                flex-wrap: wrap;
                gap: 10px;
                justify-content: center;
            }
            .legend-box {
                order: 3;
                width: 100%;
                justify-content: center;
                font-size: 14px;
                gap: 16px;
            }
            .legend-color-block {
                width: 22px;
                height: 22px;
            }
            .page-title {
                font-size: 22px;
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 5px;
            }
            .controls-bar {
                flex-direction: column;
                align-items: stretch;
                gap: 8px;
            }
            .btn-back, .btn-refresh {
                width: 100%;
                font-size: 14px;
                padding: 8px 16px;
            }
            .tolerance-selector {
                justify-content: center;
            }
            .legend-box {
                flex-wrap: wrap;
                gap: 8px;
                font-size: 11px;
                padding: 6px 10px;
            }
            .page-title {
                font-size: 18px;
                margin: 8px 0 10px 0;
            }
            .chart-label .process-name {
                font-size: 12px;
            }
            .chart-label .operator-line {
                font-size: 10px;
            }
            .process-number-box {
                font-size: 18px;
                min-width: 30px;
            }
            .kitting-number-box {
                font-size: 18px;
                min-width: 36px;
            }
        }

        @media (max-width: 600px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }
            .chart-canvas-wrapper {
                height: 250px;
            }
            .page-title {
                font-size: 16px;
                letter-spacing: 1px;
            }
            .tolerance-selector select {
                font-size: 14px;
                padding: 4px 10px;
                min-width: 80px;
            }
        }
    </style>
</head>
<body>

<div class="controls-bar">
    <a href="/" class="btn btn-light btn-back">BACK TO HOME</a>
    <div class="tolerance-selector">
        <span style="font-weight:800; font-size:16px;">TOLERANCE:</span>
        <select id="toleranceSelect" onchange="onToleranceChange()">
            <option value="none">-</option>
            <option value="10" selected>10%</option>
            <option value="30">30%</option>
            <option value="others">Others</option>
        </select>
        <input type="number" id="customToleranceInput" class="custom-tol-input" min="1" max="100" placeholder="%" onchange="onCustomToleranceChange()" onkeyup="onCustomToleranceChange()">
    </div>
    <div class="legend-box">
        <span style="font-weight:800; margin-right:5px;">LEGEND</span>
        <div class="legend-item">
            <div class="legend-color-block" style="background: #FF8C00;"></div>
            <span>(+)<br>TOL</span>
        </div>
        <div class="legend-item">
            <div class="legend-color-block" style="background: #00AA00;"></div>
            <span>TACT<br>TIME</span>
        </div>
        <div class="legend-item">
            <div class="legend-color-block" style="background: #FFB300;"></div>
            <span>(-)<br>TOL</span>
        </div>
        <span style="border-left:2px solid #ccc; height:36px; margin:0 8px;"></span>
        <div class="legend-item">
            <div class="legend-circle" style="background: #2196F3;"></div>
            <span style="font-size:12px;">BELOW<br>(-) TOL</span>
        </div>
        <div class="legend-item">
            <div class="legend-circle" style="background: #00CC00;"></div>
            <span style="font-size:12px;">WITHIN<br>TOL</span>
        </div>
        <div class="legend-item">
            <div class="legend-circle" style="background: #FF0000;"></div>
            <span style="font-size:12px;">ABOVE<br>(+) TOL</span>
        </div>
    </div>
    <div class="d-flex align-items-center gap-3">
        <span class="auto-refresh-label">Auto-refresh: <span id="refreshCountdown">30</span>s</span>
        <button class="btn btn-success btn-refresh" onclick="loadTrendData()">REFRESH</button>
    </div>
</div>

<h1 class="page-title">Graphical Monitoring</h1>

<div class="charts-grid" id="chartsGrid">
    <!-- 9 chart cells will be generated dynamically -->
</div>

<!-- Fullscreen zoom overlay -->
<div class="zoom-overlay" id="zoomOverlay">
    <div class="zoom-header">
        <button class="btn btn-light btn-zoom-back" onclick="closeZoom()">&#9664; BACK TO ALL</button>
        <span class="zoom-title" id="zoomTitle">PROCESS 1</span>
        <div style="text-align:right;">
            <div class="zoom-operator" id="zoomOperator">OPERATOR: -</div>
            <div class="zoom-kitting">KITTING: <span id="zoomKitting">0</span></div>
        </div>
    </div>
    <div class="zoom-chart-wrapper">
        <canvas id="zoomChart"></canvas>
    </div>
</div>

<script>
    let charts = {};
    let refreshTimer = null;
    let countdown = 30;
    let lastTrendData = null;
    let lastKnownUpdateTimestamp = 0;
    let dataChangePoller = null;
    let zoomedProcessNo = null;
    let zoomChartInstance = null;

    function getTolerancePercent() {
        const sel = document.getElementById('toleranceSelect');
        const val = sel.value;
        if (val === 'none') return null;
        if (val === 'others') {
            const custom = parseInt(document.getElementById('customToleranceInput').value);
            return isNaN(custom) || custom <= 0 ? null : custom / 100;
        }
        return parseInt(val) / 100;
    }

    function onToleranceChange() {
        const sel = document.getElementById('toleranceSelect');
        const customInput = document.getElementById('customToleranceInput');
        if (sel.value === 'others') {
            customInput.style.display = 'inline-block';
            customInput.focus();
        } else {
            customInput.style.display = 'none';
        }
        // Persist to localStorage
        localStorage.setItem('lineTrendTolerance', sel.value);
        rebuildAllCharts();
    }

    function onCustomToleranceChange() {
        const customInput = document.getElementById('customToleranceInput');
        localStorage.setItem('lineTrendCustomTolerance', customInput.value);
        rebuildAllCharts();
    }

    function rebuildAllCharts() {
        if (lastTrendData) {
            lastTrendData.forEach(processData => {
                const pno = processData.process_no;
                const canvasId = 'trendChart' + pno;
                createProcessChart(canvasId, processData);
            });
        }
    }

    function restoreToleranceFromStorage() {
        const saved = localStorage.getItem('lineTrendTolerance');
        const customVal = localStorage.getItem('lineTrendCustomTolerance');
        const sel = document.getElementById('toleranceSelect');
        const customInput = document.getElementById('customToleranceInput');
        if (saved) {
            sel.value = saved;
            if (saved === 'others') {
                customInput.style.display = 'inline-block';
                if (customVal) customInput.value = customVal;
            }
        }
    }

    function createProcessChart(canvasId, processData) {
        const canvas = document.getElementById(canvasId);
        if (!canvas) return;
        const ctx = canvas.getContext('2d');

        const records = processData.records || [];
        const tactTime = processData.tact_time;
        // Calculate tolerance from selected percentage
        const tolPct = getTolerancePercent();
        const noTolerance = (tolPct === null);
        const tolPlus = noTolerance ? null : Math.round((tactTime + tactTime * tolPct) * 100) / 100;
        const tolMinus = noTolerance ? null : Math.round((tactTime - tactTime * tolPct) * 100) / 100;

        // Store records for tooltip access
        const chartRecords = records;

        // Data points as plain decimal M.SS values
        const dataValues = records.map(r => r.elapsed_mss);
        const labels = records.map((r, i) => r.kitting_no || (i + 1).toString());

        // If no data, show empty chart with placeholder labels
        if (labels.length === 0) {
            for (let i = 1; i <= 5; i++) labels.push(i.toString());
        }

        // Determine Y-axis max: auto-stretchable based on data
        const refVals = [tactTime];
        if (!noTolerance) { refVals.push(tolPlus, tolMinus); }
        const allVals = [...dataValues, ...refVals];
        // Use tighter padding above tolPlus to maximize line spacing
        const topPadding = noTolerance ? 0.50 : Math.max(0.15, (tolPlus - tactTime));
        const maxVal = Math.max(...allVals.filter(v => v > 0), noTolerance ? tactTime + 0.50 : tolPlus + topPadding);
        // Round up with padding
        const yMax = Math.ceil(maxVal * 10) / 10 + 0.10;

        // Build the 5 fixed tick values for Y-axis (always starts at 0.00)
        const fixedTicks = [0.00];
        if (!noTolerance) fixedTicks.push(tolMinus);
        fixedTicks.push(tactTime);
        if (!noTolerance) fixedTicks.push(tolPlus);
        fixedTicks.push(Math.round(yMax * 100) / 100);

        // Determine dot colors:
        // If no tolerance: all dots neutral blue
        // Otherwise: GREEN if within tolerance, RED if outside tolerance
        const pointColors = dataValues.map((val, idx) => {
            if (noTolerance) return '#6699CC'; // Neutral blue
            if (val >= tolMinus && val <= tolPlus) {
                return '#00CC00'; // Within tolerance = GREEN
            }
            if (val < tolMinus) {
                return '#2196F3'; // Below (-) tolerance = BLUE
            }
            return '#FF0000'; // Above (+) tolerance = RED
        });

        const pointBorderColors = pointColors.map(c => c);

        // Horizontal reference lines as datasets (plain decimal values)
        const refLineLength = Math.max(labels.length, 5);
        const tactTimeLine = new Array(refLineLength).fill(tactTime);

        // Ensure labels match reference line length
        while (labels.length < refLineLength) {
            labels.push('');
        }

        // Build datasets
        const datasets = [];

        // (+) TOL line - only if tolerance is active
        if (!noTolerance) {
            datasets.push({
                label: '(+) TOL',
                data: new Array(refLineLength).fill(tolPlus),
                borderColor: '#FF8C00',
                borderWidth: 3,
                pointRadius: 0,
                pointHoverRadius: 0,
                fill: false,
                tension: 0,
                order: 4
            });
        }

        // TACT TIME line - always visible
        datasets.push({
            label: 'TACT TIME',
            data: tactTimeLine,
            borderColor: '#00AA00',
            borderWidth: 3,
            pointRadius: 0,
            pointHoverRadius: 0,
            fill: false,
            tension: 0,
            order: 3
        });

        // (-) TOL line - only if tolerance is active
        if (!noTolerance) {
            datasets.push({
                label: '(-) TOL',
                data: new Array(refLineLength).fill(tolMinus),
                borderColor: '#FFB300',
                borderWidth: 3,
                pointRadius: 0,
                pointHoverRadius: 0,
                fill: false,
                tension: 0,
                order: 2
            });
        }

        // Cycle Time data line
        datasets.push({
            label: 'Cycle Time',
            data: dataValues.length > 0 ? dataValues : [],
            borderColor: '#6699CC',
            borderWidth: 2,
            pointBackgroundColor: pointColors,
            pointBorderColor: pointBorderColors,
            pointRadius: 7,
            pointHoverRadius: 9,
            pointBorderWidth: 2,
            fill: false,
            tension: 0.1,
            order: 1
        });

        if (charts[canvasId]) {
            charts[canvasId].destroy();
        }

        const fixedTicksCopy = [...fixedTicks];

        charts[canvasId] = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: datasets
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                layout: {
                    padding: {
                        top: 5,
                        right: 10,
                        bottom: 5,
                        left: 5
                    }
                },
                scales: {
                    x: {
                        display: true,
                        grid: {
                            display: true,
                            color: '#e0e0e0'
                        },
                        ticks: {
                            display: false
                        }
                    },
                    y: {
                        min: 0,
                        max: Math.round(yMax * 100) / 100,
                        grid: {
                            display: true,
                            color: '#e0e0e0'
                        },
                        afterBuildTicks: function(axis) {
                            axis.ticks = fixedTicksCopy.map(v => ({ value: v }));
                        },
                        ticks: {
                            font: {
                                size: 10,
                                weight: 'bold'
                            },
                            color: '#000',
                            autoSkip: false,
                            callback: function(value) {
                                return value.toFixed(2);
                            }
                        },
                        title: {
                            display: false
                        }
                    }
                },
                plugins: {
                    legend: {
                        display: false
                    },
                    tooltip: {
                        callbacks: {
                            title: function(context) {
                                if (context[0].dataset.label === 'Cycle Time') {
                                    const idx = context[0].dataIndex;
                                    const record = chartRecords[idx];
                                    if (record && record.kitting_no) {
                                        return 'Kitting: ' + record.kitting_no;
                                    }
                                }
                                return '';
                            },
                            label: function(context) {
                                if (context.dataset.label === 'Cycle Time') {
                                    const idx = context.dataIndex;
                                    const record = chartRecords[idx];
                                    const lines = [];
                                    if (record && record.date) {
                                        lines.push('Date: ' + record.date);
                                    }
                                    if (record && record.time) {
                                        lines.push('Time: ' + record.time);
                                    }
                                    lines.push('Cycle: ' + context.raw.toFixed(2));
                                    return lines;
                                }
                                return context.dataset.label + ': ' + context.raw.toFixed(2);
                            }
                        },
                        titleFont: { size: 18, weight: 'bold' },
                        bodyFont: { size: 16 },
                        padding: 14,
                        boxPadding: 8
                    }
                }
            }
        });
    }

    function buildChartCells() {
        const grid = document.getElementById('chartsGrid');
        grid.innerHTML = '';
        for (let i = 1; i <= 9; i++) {
            const cell = document.createElement('div');
            cell.className = 'chart-cell';
            cell.setAttribute('data-process', i);
            cell.addEventListener('click', function() {
                openZoom(parseInt(this.getAttribute('data-process')));
            });
            cell.innerHTML = `
                <div class="chart-canvas-wrapper">
                    <canvas id="trendChart${i}"></canvas>
                </div>
                <div class="chart-label-row">
                    <div class="process-number-box" id="processNumBox${i}">${i}</div>
                    <div class="chart-label-content">
                        <div class="chart-label">
                            <div class="process-name">PROCESS ${i}</div>
                            <div class="operator-line">OPERATOR: <span id="operator${i}">-</span></div>
                        </div>
                    </div>
                    <div class="kitting-number-box" id="kittingBox${i}" title="Kitting No.">0</div>
                </div>
            `;
            grid.appendChild(cell);
        }
    }

    function loadTrendData() {
        fetch('/api/get_line_trend_data')
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    lastTrendData = data.trend_data;
                    data.trend_data.forEach(processData => {
                        const pno = processData.process_no;
                        const canvasId = 'trendChart' + pno;
                        createProcessChart(canvasId, processData);

                        // Update operator name
                        const opEl = document.getElementById('operator' + pno);
                        if (opEl) {
                            opEl.textContent = processData.operator || '-';
                        }

                        // Update kitting number box
                        const kitEl = document.getElementById('kittingBox' + pno);
                        if (kitEl) {
                            kitEl.textContent = processData.completed_count || 0;
                        }
                    });
                    // If zoomed in, refresh the zoomed chart too
                    if (zoomedProcessNo !== null) {
                        renderZoomChart(zoomedProcessNo);
                        const opEl = document.getElementById('operator' + zoomedProcessNo);
                        document.getElementById('zoomOperator').textContent = 'OPERATOR: ' + (opEl ? opEl.textContent : '-');
                        const kitEl = document.getElementById('kittingBox' + zoomedProcessNo);
                        document.getElementById('zoomKitting').textContent = kitEl ? kitEl.textContent : '0';
                    }
                } else {
                    console.error('Failed to load trend data:', data.error);
                }
            })
            .catch(error => {
                console.error('Error loading trend data:', error);
            });
    }

    // Auto-refresh countdown (fallback every 30s)
    function startAutoRefresh() {
        countdown = 30;
        if (refreshTimer) clearInterval(refreshTimer);

        refreshTimer = setInterval(() => {
            countdown--;
            document.getElementById('refreshCountdown').textContent = countdown;
            if (countdown <= 0) {
                countdown = 30;
                loadTrendData();
            }
        }, 1000);
    }

    // Poll active timers to toggle blink on process number boxes
    let activeTimerPoller = null;
    function startActiveTimerPolling() {
        if (activeTimerPoller) clearInterval(activeTimerPoller);
        pollActiveTimers();
        activeTimerPoller = setInterval(pollActiveTimers, 1000);
    }

    // Convert elapsed seconds to M.SS decimal format (e.g. 65s -> 1.05, 110s -> 1.50)
    function secondsToMSS(totalSec) {
        const mins = Math.floor(totalSec / 60);
        const secs = totalSec % 60;
        return mins + secs / 100;
    }

    // Determine blink class based on elapsed time vs tolerance thresholds
    function getBlinkClass(elapsedSeconds) {
        const tactTime = 1.50; // Fixed tact time
        const tolPct = getTolerancePercent();
        const mss = secondsToMSS(elapsedSeconds);

        // If no tolerance is set, always blink green
        if (tolPct === null) return 'blink-green';

        const tolMinus = Math.round((tactTime - tactTime * tolPct) * 100) / 100;
        const tolPlus  = Math.round((tactTime + tactTime * tolPct) * 100) / 100;

        if (mss < tolMinus) {
            return 'blink-green';
        } else if (mss >= tolMinus && mss < tactTime) {
            return 'blink-neg-tol';
        } else if (mss >= tactTime && mss < tolPlus) {
            return 'blink-green';
        } else {
            // At or above (+) tolerance -> RED
            return 'blink-red';
        }
    }

    const ALL_BLINK_CLASSES = ['blink-green', 'blink-neg-tol', 'blink-pos-tol', 'blink-red'];

    function pollActiveTimers() {
        fetch('/api/get_all_active_timers')
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    for (let i = 1; i <= 9; i++) {
                        const box = document.getElementById('processNumBox' + i);
                        if (!box) continue;
                        const timerInfo = data.active_timers[String(i)];
                        if (timerInfo && timerInfo.active) {
                            const desiredClass = getBlinkClass(timerInfo.elapsed_seconds);
                            // Only update if the class changed
                            if (!box.classList.contains(desiredClass)) {
                                ALL_BLINK_CLASSES.forEach(c => box.classList.remove(c));
                                box.classList.add(desiredClass);
                            }
                        } else {
                            ALL_BLINK_CLASSES.forEach(c => box.classList.remove(c));
                        }
                    }
                }
            })
            .catch(() => {});
    }

    // Smart polling: check for data changes every 3 seconds
    function startDataChangePolling() {
        if (dataChangePoller) clearInterval(dataChangePoller);
        dataChangePoller = setInterval(() => {
            fetch('/api/get_last_update')
                .then(response => response.json())
                .then(data => {
                    if (data.success && data.timestamp > lastKnownUpdateTimestamp) {
                        lastKnownUpdateTimestamp = data.timestamp;
                        console.log('[AUTO-REFRESH] Data change detected, refreshing charts...');
                        loadTrendData();
                        // Reset the countdown
                        countdown = 30;
                        document.getElementById('refreshCountdown').textContent = countdown;
                    }
                })
                .catch(err => {});
        }, 3000);
    }

    function openZoom(processNo) {
        zoomedProcessNo = processNo;
        const overlay = document.getElementById('zoomOverlay');
        overlay.classList.add('active');

        // Update header info
        document.getElementById('zoomTitle').textContent = 'PROCESS ' + processNo;
        const opEl = document.getElementById('operator' + processNo);
        document.getElementById('zoomOperator').textContent = 'OPERATOR: ' + (opEl ? opEl.textContent : '-');
        const kitEl = document.getElementById('kittingBox' + processNo);
        document.getElementById('zoomKitting').textContent = kitEl ? kitEl.textContent : '0';

        // Render zoomed chart
        renderZoomChart(processNo);
    }

    function closeZoom() {
        zoomedProcessNo = null;
        const overlay = document.getElementById('zoomOverlay');
        overlay.classList.remove('active');
        if (zoomChartInstance) {
            zoomChartInstance.destroy();
            zoomChartInstance = null;
        }
    }

    function renderZoomChart(processNo) {
        if (!lastTrendData) return;
        const processData = lastTrendData.find(d => d.process_no === processNo);
        if (!processData) return;

        const canvas = document.getElementById('zoomChart');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');

        const records = processData.records || [];
        const tactTime = processData.tact_time;
        const tolPct = getTolerancePercent();
        const noTolerance = (tolPct === null);
        const tolPlus = noTolerance ? null : Math.round((tactTime + tactTime * tolPct) * 100) / 100;
        const tolMinus = noTolerance ? null : Math.round((tactTime - tactTime * tolPct) * 100) / 100;

        // Store records for tooltip access in zoomed view
        const zoomRecords = records;

        const dataValues = records.map(r => r.elapsed_mss);
        const labels = records.map((r, i) => r.kitting_no || (i + 1).toString());
        if (labels.length === 0) {
            for (let i = 1; i <= 5; i++) labels.push(i.toString());
        }

        const refVals = [tactTime];
        if (!noTolerance) { refVals.push(tolPlus, tolMinus); }
        const allVals = [...dataValues, ...refVals];
        const topPadding = noTolerance ? 0.50 : Math.max(0.15, (tolPlus - tactTime));
        const maxVal = Math.max(...allVals.filter(v => v > 0), noTolerance ? tactTime + 0.50 : tolPlus + topPadding);
        const yMax = Math.ceil(maxVal * 10) / 10 + 0.10;

        const fixedTicks = [0.00];
        if (!noTolerance) fixedTicks.push(tolMinus);
        fixedTicks.push(tactTime);
        if (!noTolerance) fixedTicks.push(tolPlus);
        fixedTicks.push(Math.round(yMax * 100) / 100);

        const pointColors = dataValues.map((val) => {
            if (noTolerance) return '#6699CC';
            if (val >= tolMinus && val <= tolPlus) return '#00CC00';
            if (val < tolMinus) return '#2196F3';
            return '#FF0000';
        });

        const refLineLength = Math.max(labels.length, 5);
        const tactTimeLine = new Array(refLineLength).fill(tactTime);
        while (labels.length < refLineLength) labels.push('');

        const datasets = [];
        if (!noTolerance) {
            datasets.push({
                label: '(+) TOL',
                data: new Array(refLineLength).fill(tolPlus),
                borderColor: '#FF8C00', borderWidth: 4, pointRadius: 0, pointHoverRadius: 0, fill: false, tension: 0, order: 4
            });
        }
        datasets.push({
            label: 'TACT TIME',
            data: tactTimeLine,
            borderColor: '#00AA00', borderWidth: 4, pointRadius: 0, pointHoverRadius: 0, fill: false, tension: 0, order: 3
        });
        if (!noTolerance) {
            datasets.push({
                label: '(-) TOL',
                data: new Array(refLineLength).fill(tolMinus),
                borderColor: '#FFB300', borderWidth: 4, pointRadius: 0, pointHoverRadius: 0, fill: false, tension: 0, order: 2
            });
        }
        datasets.push({
            label: 'Cycle Time',
            data: dataValues.length > 0 ? dataValues : [],
            borderColor: '#6699CC', borderWidth: 3,
            pointBackgroundColor: pointColors, pointBorderColor: pointColors.map(c => c),
            pointRadius: 12, pointHoverRadius: 15, pointBorderWidth: 3,
            fill: false, tension: 0.1, order: 1
        });

        if (zoomChartInstance) zoomChartInstance.destroy();

        const fixedTicksCopy = [...fixedTicks];
        zoomChartInstance = new Chart(ctx, {
            type: 'line',
            data: { labels: labels, datasets: datasets },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                layout: { padding: { top: 15, right: 30, bottom: 15, left: 15 } },
                scales: {
                    x: {
                        display: true,
                        grid: { display: true, color: '#e0e0e0' },
                        ticks: { display: true, font: { size: 16, weight: 'bold' }, color: '#000' }
                    },
                    y: {
                        min: 0,
                        max: Math.round(yMax * 100) / 100,
                        grid: { display: true, color: '#e0e0e0' },
                        afterBuildTicks: function(axis) {
                            axis.ticks = fixedTicksCopy.map(v => ({ value: v }));
                        },
                        ticks: {
                            font: { size: 16, weight: 'bold' },
                            color: '#000',
                            autoSkip: false,
                            callback: function(value) { return value.toFixed(2); }
                        },
                        title: { display: false }
                    }
                },
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        titleFont: { size: 22, weight: 'bold' },
                        bodyFont: { size: 18 },
                        padding: 16,
                        boxPadding: 10,
                        callbacks: {
                            title: function(context) {
                                if (context[0].dataset.label === 'Cycle Time') {
                                    const idx = context[0].dataIndex;
                                    const record = zoomRecords[idx];
                                    if (record && record.kitting_no) {
                                        return 'Kitting: ' + record.kitting_no;
                                    }
                                }
                                return '';
                            },
                            label: function(context) {
                                if (context.dataset.label === 'Cycle Time') {
                                    const idx = context.dataIndex;
                                    const record = zoomRecords[idx];
                                    const lines = [];
                                    if (record && record.date) {
                                        lines.push('Date: ' + record.date);
                                    }
                                    if (record && record.time) {
                                        lines.push('Time: ' + record.time);
                                    }
                                    lines.push('Cycle: ' + context.raw.toFixed(2));
                                    return lines;
                                }
                                return context.dataset.label + ': ' + context.raw.toFixed(2);
                            }
                        }
                    }
                }
            }
        });
    }

    // ESC key to close zoom
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && zoomedProcessNo !== null) closeZoom();
    });

    // Initialize on page load
    window.addEventListener('load', () => {
        restoreToleranceFromStorage();
        buildChartCells();
        loadTrendData();
        startAutoRefresh();
        startActiveTimerPolling();
        // Start smart polling for data changes
        fetch('/api/get_last_update')
            .then(r => r.json())
            .then(d => { if (d.success) lastKnownUpdateTimestamp = d.timestamp; })
            .catch(() => {})
            .finally(() => startDataChangePolling());
    });
</script>

</body>
