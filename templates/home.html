<!DOCTYPE html>
<html="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cycle Time Monitoring</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

    <div class="container-fluid p-5 bg-primary text-white text-center">
        <h1>Cycle Time Monitoring</h1>
        <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Itaque corrupti excepturi tempora? Dolores facilis autem perferendis qui corporis deserunt.</p>
    </div>

    <div class="container mt-4">
        <h2 class="mb-4">Home</h2>

        <div class="d-flex flex-wrap gap-2">
            <a href="/process1" class="btn btn-primary">Process 1</a>
            <a href="/process2" class="btn btn-primary">Process 2</a>
            <a href="/process3" class="btn btn-primary">Process 3</a>
            <a href="/process4" class="btn btn-primary">Process 4</a>
            <a href="/process5" class="btn btn-primary">Process 5</a>
            <a href="/process6" class="btn btn-primary">Process 6</a>
            <a href="/process7" class="btn btn-primary">Process 7</a>
            <a href="/process8" class="btn btn-primary">Process 8</a>
            <a href="/process9" class="btn btn-primary">Process 9</a>
        </div>
    </div>

    <script>
        // Check if all processes have equal counters and reset if they do
        function checkAndResetAllCounters() {
            const counters = [];
            for (let i = 1; i <= 9; i++) {
                const value = localStorage.getItem(`process${i}_counter`);
                counters.push(value !== null ? parseInt(value) : 0);
            }
            
            // Check if all counters are equal and not all zero
            if (counters.length > 0 && counters.every(val => val === counters[0]) && counters[0] > 0) {
                // Reset all counters to 0
                for (let i = 1; i <= 9; i++) {
                    localStorage.setItem(`process${i}_counter`, '0');
                }
                console.log('All counters were equal, reset to 0');
            }
        }

        // Check when page loads
        window.addEventListener('load', checkAndResetAllCounters);
    </script>

</body>
</html>
